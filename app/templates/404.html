{% extends "base.html" %}
{% block title %}404 | Page Not Found{% endblock %}
{% block content %}
<style>
    .container,
    .container-fluid {
        padding: 0 !important;
        margin: 0 !important;
        max-width: 100% !important;
    }

    body>div[style="height: 80px;"] {
        display: none;
    }

    .error-wrapper {
        min-height: 100vh;
        width: 100vw;
        background: radial-gradient(circle at 50% 0%, #111 0%, #000 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .sleek-panel {
        background: rgba(15, 15, 15, 0.6);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.04);
        border-radius: 24px;
        padding: 4rem 2rem;
        max-width: 600px;
        text-align: center;
        transition: border-color 0.4s ease;
    }

    .error-code {
        font-size: 8rem;
        font-weight: 900;
        color: white;
        line-height: 1;
        margin-bottom: 1rem;
        text-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
        letter-spacing: -5px;
    }

    .reveal-element {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.8s ease-out;
    }

    .reveal-visible {
        opacity: 1;
        transform: translateY(0);
    }
</style>
<div class="error-wrapper">
    <div class="sleek-panel reveal-element">
        <h1 class="error-code">404</h1>
        <h3 class="text-white fw-bold mb-3">Endpoint Not Found</h3>
        <p class="text-secondary mb-5 lh-lg">
            The Requested Logic Path does not Exist or has been Refactored.
            Even the Best Algorithms Encounter a Dead end Occasionally.
        </p>
        <div class="d-flex flex-column gap-3">
            <a href="{{ url_for('home.home') }}" class="btn btn-light rounded-pill fw-bold py-3 w-100">
                <i class="fas fa-home me-2"></i> Return to Main Archive
            </a>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            document.querySelector('.reveal-element').classList.add('reveal-visible');
        }, 100);
    });
</script>
{% endblock %}
