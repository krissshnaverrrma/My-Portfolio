{% extends 'base.html' %}
{% block title %}Home{% endblock %}
{% block content %}
<style>
    .container,
    .container-fluid {
        padding: 0 !important;
        margin: 0 !important;
        max-width: 100% !important;
    }

    body>div[style="height: 80px;"] {
        display: none;
    }

    .btn-action {
        padding: 12px 35px;
        border-radius: 50px;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        font-size: 0.85rem;
        text-decoration: none;
        transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 2px solid transparent;
    }

    .btn-pill-black {
        background: #000000;
        color: #ffffff;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .btn-pill-black:hover {
        background: #ffffff;
        color: #000000;
        transform: translateY(-3px);
        box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2);
        border-color: #ffffff;
    }

    .btn-pill-black i,
    .btn-pill-black img {
        transition: transform 0.3s ease;
    }

    .btn-pill-black:hover .fa-code-branch {
        transform: translateX(3px) rotate(15deg);
    }

    .btn-pill-black:hover .fa-user {
        transform: scale(1.1);
    }

    .admin-corner-link {
        position: fixed;
        bottom: 30px;
        right: 30px;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.5);
        font-size: 1.2rem;
        z-index: 50;
        transition: all 0.3s ease;
        text-decoration: none;
    }

    .admin-corner-link:hover {
        background: #ffffff;
        color: #000000;
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        border-color: #ffffff;
    }
</style>

<div class="glass-panel p-0 overflow-hidden"
    style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border-radius: 0; border: none; z-index: 10;">
    <div class="row g-0 h-100">
        <div class="col-lg-6 h-100 position-relative p-0">
            <img src="{{ profile.profile_image }}" alt="{{ profile.name }}"
                style="width: 100%; height: 100%; object-fit: cover; object-position: center;">
            <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.15);">
            </div>
        </div>
        <div class="col-lg-6 h-100 d-flex align-items-center justify-content-center p-0"
            style="background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(30px);">
            <div class="p-5 pe-lg-5 w-100" style="max-width: 100%;">
                <h6 class="text-uppercase mb-3" style="letter-spacing: 2px; color: var(--primary-color); opacity: 1.0;">
                    <div style="display: flex; align-items: center; white-space: nowrap;">
                        <span style="font-family: sans-serif; font-weight: bold; letter-spacing: 2px;">MY
                            PORTFOLIO</span>
                        <div
                            style="height: 2px; background-color: white; flex-grow: 1; margin-left: 15px; margin-right: 20px;">
                        </div>
                    </div>
                </h6>
                <h1 class="display-4 fw-bold mb-1 text-white">
                    Hello, I'm <br> {{ profile.name }}
                </h1>
                <h3 class="fw-light mb-4 text-light opacity-75">{{ profile.home_title }}</h3>
                <p class="lead mb-4"
                    style="color: #d0d0d0; font-size: 1.15rem; line-height: 1.8; font-weight: 300; text-align: justify;">
                    {{ profile.home_description | safe }}
                </p>
                <div class="mb-5 p-4 rounded"
                    style="background: rgba(255,255,255,0.03); border-left: 4px solid #ffffff; backdrop-filter: blur(10px);">
                    <div class="d-flex align-items-center mb-2">
                        <img src="{{ profile.bot_image }}" alt="AI Assistant" class="me-2 rounded-circle shadow-sm"
                            style="width: 24px; height: 24px; object-fit: cover;">
                        <span class="fw-bold text-white" style="letter-spacing: 1px; font-size: 0.85rem;">{{
                            profile.philosophy_title }}</span>
                    </div>
                    <p class="mb-0 text-light opacity-75"
                        style="font-size: 1.05rem; font-style: italic; text-align: justify;">
                        {{ profile.philosophy_text }}
                    </p>
                </div>
                <div class="d-flex gap-4 flex-wrap">
                    <a href="{{ url_for('main.about') }}" class="btn-action btn-pill-black">
                        <img src="{{ profile.profile_image }}" alt="Profile" class="me-2 rounded-circle shadow-sm"
                            style="width: 20px; height: 20px; object-fit: cover;"> About Me
                    </a>
                    <a href="{{ url_for('main.skills') }}" class="btn-action btn-pill-black">
                        View Skills <i class="fas fa-code-branch ms-2"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
<a href="{{ url_for('admin.login') }}" class="admin-corner-link" title="System Configuration Access">
    <i class="fas fa-fingerprint"></i>
</a>
{% endblock %}
