{% extends "base.html" %}
{% block title %}500 | System Refactor Needed{% endblock %}
{% block content %}
<style>
    .container,
    .container-fluid {
        padding: 0 !important;
        margin: 0 !important;
        max-width: 100% !important;
    }

    body>div[style="height: 80px;"] {
        display: none;
    }

    .error-wrapper {
        min-height: 100vh;
        width: 100vw;
        background: radial-gradient(circle at 50% 0%, #151010 0%, #000 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
    }

    .sleek-panel {
        background: rgba(15, 10, 10, 0.6);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 100, 100, 0.05);
        border-radius: 24px;
        padding: 4rem 2rem;
        max-width: 600px;
        text-align: center;
    }

    .error-code {
        font-size: 8rem;
        font-weight: 900;
        color: #ff4d4d;
        line-height: 1;
        margin-bottom: 1rem;
        text-shadow: 0 0 40px rgba(255, 77, 77, 0.2);
        letter-spacing: -5px;
    }

    .reveal-element {
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.8s ease-out;
    }

    .reveal-visible {
        opacity: 1;
        transform: translateY(0);
    }
</style>
<div class="error-wrapper">
    <div class="sleek-panel reveal-element">
        <h1 class="error-code">500</h1>
        <h3 class="text-white fw-bold mb-3">Internal Server Error</h3>
        <p class="text-secondary mb-5 lh-lg">
            Something broke in the Backend Architecture. Don't worry—my AI Assistant
            is likely Already Automating a Fix for this Redundancy.
        </p>
        <div class="d-flex flex-column gap-3">
            <button onclick="location.reload()" class="btn btn-outline-danger rounded-pill fw-bold py-3 w-100"
                style="border-color: #ff4d4d; color: #ff4d4d;">
                <i class="fas fa-redo me-2"></i> Attempt Hotfix (Refresh)
            </button>
            <a href="{{ url_for('home.home') }}" class="btn btn-outline-light rounded-pill fw-bold py-3 w-100">
                <i class="fas fa-home me-2"></i> Exit to Safety
            </a>
        </div>
    </div>
</div>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            document.querySelector('.reveal-element').classList.add('reveal-visible');
        }, 100);
    });
</script>
{% endblock %}
