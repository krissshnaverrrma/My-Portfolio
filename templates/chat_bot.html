<link rel="stylesheet" href="{{ url_for('static', filename='css/chat_bot.css') }}">

<div class="chat-widget-container">
  <div class="glass-chat-window" id="chat-window">
    <div class="chat-header d-flex justify-content-between align-items-center px-3 py-3">
      <div class="d-flex align-items-center gap-2">
        <img src="{{ url_for('static', filename='assets/chat_bot.png') }}" alt="Bot Avatar"
          style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;">
        <div>
          <span class="fw-bold text-white d-block" style="font-size: 1rem; line-height: 1.2;">Krishna's Virtual  AI
            Assistant</span>

          <small style="font-size: 0.75rem;">
            <i class="fas fa-circle" id="status-dot"
              style="font-size: 0.5rem; color: {% if is_ai_online %}#2ecc71{% else %}#ff4d4d{% endif %};"></i>
            <span id="status-label" class="{% if is_ai_online %}text-success{% else %}text-danger{% endif %}">
              {% if is_ai_online %}Online{% else %}Offline{% endif %}
            </span>
          </small>
        </div>
      </div>
      <button onclick="toggleChat()" class="btn-close-x">&times;</button>
    </div>

    <div class="chat-body" id="chat-body">
      <div id="typing-indicator" class="bot-message" style="display: none;">
        <div class="typing-wrapper">
          Typing....<div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
      </div>
      <div id="greeting-message" class="bot-message" style="display: none;">
        Hello! I'm Krishna's Virtual AI Assistant.<br>
        Ask Me about his <b>Projects</b> or <b>Skills</b> or <b>Hobbies</b>!
      </div>
    </div>

    <div class="chat-input-area">
      <input type="text" id="user-input"
        placeholder="{% if is_ai_online %}Ask me anything...{% else %}currently sleeping{% endif %}"
        onkeypress="handleEnter(event)" {% if not is_ai_online %}disabled{% endif %}>
      <button onclick="sendMessage()" {% if not is_ai_online %}disabled{% endif %}>
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <div class="chat-icon-btn" onclick="toggleChat()">
    <img src="{{ url_for('static', filename='assets/chat_bot.png') }}" alt="Chat Icon"
      style="width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.2);">
  </div>
</div>

<script src="{{ url_for('static', filename='js/chat_bot.js') }}"></script>
