<!DOCTYPE html>
<html lang="en">

<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>{% block title %}Krishna's Portfolio{% endblock %}</title>
     <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='assets/favicon.svg') }}">
     <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
     <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

     <nav class="navbar navbar-expand-lg fixed-top">
          <div class="container">
               <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('home') }}">
                    <i class="fas fa-terminal border p-2 rounded-circle" style="font-size: 0.8em;"></i>
                    <span style="font-weight: 700; letter-spacing: 1px;">Krishna-Verma</span>
               </a>
               <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
               </button>
               <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                         <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
                         <li class="nav-item"><a class="nav-link" href="{{ url_for('about') }}">About</a></li>
                         <li class="nav-item"><a class="nav-link" href="{{ url_for('projects') }}">Projects</a></li>
                         <li class="nav-item"><a class="nav-link" href="{{ url_for('skills') }}">Skills</a></li>
                         <li class="nav-item"><a class="nav-link" href="{{ url_for('contact') }}">Contact</a></li>
                    </ul>
               </div>
          </div>
     </nav>

     <div style="height: 80px;"></div>

     <div class="container mt-4 mb-5">
          {% block content %}{% endblock %}
     </div>

     <footer class="footer">
          <p>&copy; 2026 - Krishna Verma.</p>
     </footer>

     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
     <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>

</html>
